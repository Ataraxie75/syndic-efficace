backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"
locale: "fr"
# Cache bust: 2025-05-03-2

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      - name: "avocate"
        label: "👩‍⚖️ Votre profil"
        file: "data/avocate.json"
        fields:
          - label: "Nom complet"
            name: "nom"
            widget: "string"
            hint: "Ex : Maître Marie Dupont"
          - label: "Titre"
            name: "titre"
            widget: "string"
            hint: "Ex : Avocate au Barreau de Paris"
          - label: "Biographie — paragraphe 1"
            name: "bio_1"
            widget: "text"
          - label: "Biographie — paragraphe 2"
            name: "bio_2"
            widget: "text"
          - label: "Diplômes et formations"
            name: "diplomes"
            widget: "list"
            label_singular: "Ligne"
            field:
              label: "Ligne"
              name: "item"
              widget: "string"
          - label: "Photo professionnelle"
            name: "photo"
            widget: "image"
            required: false
            hint: "Photo de l'avocate (fond neutre recommandé)"

      - name: "contact"
        label: "📞 Coordonnées"
        file: "data/contact.json"
        fields:
          - label: "Téléphone (affiché)"
            name: "telephone"
            widget: "string"
            hint: "Ex : 01 23 45 67 89"
          - label: "Téléphone (lien cliquable, sans espaces)"
            name: "telephone_href"
            widget: "string"
            hint: "Ex : +33123456789"
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "Adresse — ligne 1"
            name: "adresse_1"
            widget: "string"
            hint: "Numéro et rue"
          - label: "Adresse — ligne 2"
            name: "adresse_2"
            widget: "string"
            hint: "Code postal et ville"
          - label: "Horaires bureau"
            name: "horaires_bureau"
            widget: "string"
            hint: "Ex : Lundi – Vendredi : 9h – 18h"
          - label: "Horaires permanence téléphonique"
            name: "horaires_permanence"
            widget: "string"
            hint: "Ex : Permanence téléphonique : 9h30 – 12h30"

      - name: "stats"
        label: "📊 Chiffres clés"
        file: "data/stats.json"
        fields:
          - label: "Chiffre 1 — valeur"
            name: "stat_1_val"
            widget: "string"
            hint: "Ex : 15"
          - label: "Chiffre 1 — libellé"
            name: "stat_1_lbl"
            widget: "string"
            hint: "Ex : ans d'expérience"
          - label: "Chiffre 2 — valeur"
            name: "stat_2_val"
            widget: "string"
          - label: "Chiffre 2 — libellé"
            name: "stat_2_lbl"
            widget: "string"
          - label: "Chiffre 3 — valeur"
            name: "stat_3_val"
            widget: "string"
          - label: "Chiffre 3 — libellé"
            name: "stat_3_lbl"
            widget: "string"

      - name: "temoignages"
        label: "💬 Témoignages clients"
        file: "data/temoignages.json"
        fields:
          - label: "Témoignage 1 — Texte"
            name: "t1_texte"
            widget: "text"
          - label: "Témoignage 1 — Nom"
            name: "t1_nom"
            widget: "string"
          - label: "Témoignage 1 — Rôle / contexte"
            name: "t1_role"
            widget: "string"
            hint: "Ex : Copropriétaire, Paris 11e"
          - label: "Témoignage 1 — Initiales"
            name: "t1_initiales"
            widget: "string"
            hint: "Ex : P.M"
          - label: "Témoignage 2 — Texte"
            name: "t2_texte"
            widget: "text"
          - label: "Témoignage 2 — Nom"
            name: "t2_nom"
            widget: "string"
          - label: "Témoignage 2 — Rôle / contexte"
            name: "t2_role"
            widget: "string"
          - label: "Témoignage 2 — Initiales"
            name: "t2_initiales"
            widget: "string"
          - label: "Témoignage 3 — Texte"
            name: "t3_texte"
            widget: "text"
          - label: "Témoignage 3 — Nom"
            name: "t3_nom"
            widget: "string"
          - label: "Témoignage 3 — Rôle / contexte"
            name: "t3_role"
            widget: "string"
          - label: "Témoignage 3 — Initiales"
            name: "t3_initiales"
            widget: "string"

      - name: "copropriete"
        label: "🏢 Page Copropriété"
        file: "data/copropriete.json"
        fields:
          - label: "Titre principal"
            name: "hero_titre"
            widget: "string"
          - label: "Sous-titre"
            name: "hero_sous_titre"
            widget: "text"
          - label: "Cartes d'intervention"
            name: "cartes"
            widget: "object"
            collapsed: false
            fields:
              - label: "Carte 1 — Titre"
                name: "c1_titre"
                widget: "string"
              - label: "Carte 1 — Texte"
                name: "c1_texte"
                widget: "text"
              - label: "Carte 2 — Titre"
                name: "c2_titre"
                widget: "string"
              - label: "Carte 2 — Texte"
                name: "c2_texte"
                widget: "text"
              - label: "Carte 3 — Titre"
                name: "c3_titre"
                widget: "string"
              - label: "Carte 3 — Texte"
                name: "c3_texte"
                widget: "text"
              - label: "Carte 4 — Titre"
                name: "c4_titre"
                widget: "string"
              - label: "Carte 4 — Texte"
                name: "c4_texte"
                widget: "text"
              - label: "Carte 5 — Titre"
                name: "c5_titre"
                widget: "string"
              - label: "Carte 5 — Texte"
                name: "c5_texte"
                widget: "text"
              - label: "Carte 6 — Titre"
                name: "c6_titre"
                widget: "string"
              - label: "Carte 6 — Texte"
                name: "c6_texte"
                widget: "text"
          - label: "Texte cadre légal"
            name: "cadre_texte"
            widget: "text"
          - label: "Questions fréquentes"
            name: "faq"
            widget: "object"
            collapsed: false
            fields:
              - label: "Question 1"
                name: "q1_question"
                widget: "string"
              - label: "Réponse 1"
                name: "q1_reponse"
                widget: "text"
              - label: "Question 2"
                name: "q2_question"
                widget: "string"
              - label: "Réponse 2"
                name: "q2_reponse"
                widget: "text"
              - label: "Question 3"
                name: "q3_question"
                widget: "string"
              - label: "Réponse 3"
                name: "q3_reponse"
                widget: "text"
              - label: "Question 4"
                name: "q4_question"
                widget: "string"
              - label: "Réponse 4"
                name: "q4_reponse"
                widget: "text"
              - label: "Question 5"
                name: "q5_question"
                widget: "string"
              - label: "Réponse 5"
                name: "q5_reponse"
                widget: "text"
          - label: "Bouton CTA — Titre"
            name: "cta_titre"
            widget: "string"
          - label: "Bouton CTA — Sous-titre"
            name: "cta_sous_titre"
            widget: "string"

      - name: "energie"
        label: "⚡ Page Transition énergétique"
        file: "data/energie.json"
        fields:
          - label: "Eyebrow (petite étiquette)"
            name: "hero_eyebrow"
            widget: "string"
            hint: "Ex : Enjeu 2024–2026"
          - label: "Titre principal"
            name: "hero_titre"
            widget: "string"
          - label: "Sous-titre"
            name: "hero_sous_titre"
            widget: "text"
          - label: "Section intro — Titre"
            name: "intro_titre"
            widget: "string"
          - label: "Section intro — Paragraphe 1"
            name: "intro_texte_1"
            widget: "text"
          - label: "Section intro — Paragraphe 2"
            name: "intro_texte_2"
            widget: "text"
          - label: "Cartes d'intervention"
            name: "cartes"
            widget: "object"
            collapsed: false
            fields:
              - label: "Carte 1 — Titre"
                name: "c1_titre"
                widget: "string"
              - label: "Carte 1 — Texte"
                name: "c1_texte"
                widget: "text"
              - label: "Carte 2 — Titre"
                name: "c2_titre"
                widget: "string"
              - label: "Carte 2 — Texte"
                name: "c2_texte"
                widget: "text"
              - label: "Carte 3 — Titre"
                name: "c3_titre"
                widget: "string"
              - label: "Carte 3 — Texte"
                name: "c3_texte"
                widget: "text"
              - label: "Carte 4 — Titre"
                name: "c4_titre"
                widget: "string"
              - label: "Carte 4 — Texte"
                name: "c4_texte"
                widget: "text"
              - label: "Carte 5 — Titre"
                name: "c5_titre"
                widget: "string"
              - label: "Carte 5 — Texte"
                name: "c5_texte"
                widget: "text"
              - label: "Carte 6 — Titre"
                name: "c6_titre"
                widget: "string"
              - label: "Carte 6 — Texte"
                name: "c6_texte"
                widget: "text"
          - label: "Questions fréquentes"
            name: "faq"
            widget: "object"
            collapsed: false
            fields:
              - label: "Question 1"
                name: "q1_question"
                widget: "string"
              - label: "Réponse 1"
                name: "q1_reponse"
                widget: "text"
              - label: "Question 2"
                name: "q2_question"
                widget: "string"
              - label: "Réponse 2"
                name: "q2_reponse"
                widget: "text"
              - label: "Question 3"
                name: "q3_question"
                widget: "string"
              - label: "Réponse 3"
                name: "q3_reponse"
                widget: "text"
              - label: "Question 4"
                name: "q4_question"
                widget: "string"
              - label: "Réponse 4"
                name: "q4_reponse"
                widget: "text"
              - label: "Question 5"
                name: "q5_question"
                widget: "string"
              - label: "Réponse 5"
                name: "q5_reponse"
                widget: "text"
          - label: "Bouton CTA — Titre"
            name: "cta_titre"
            widget: "string"
          - label: "Bouton CTA — Sous-titre"
            name: "cta_sous_titre"
            widget: "string"

      - name: "legal"
        label: "📋 Mentions légales"
        file: "data/legal.json"
        fields:
          - label: "Nom complet de l'avocate"
            name: "nom_cabinet"
            widget: "string"
            hint: "Ex : Maître Laetitia Krowicki"
          - label: "Numéro SIRET"
            name: "siret"
            widget: "string"
            hint: "14 chiffres — visible dans votre attestation URSSAF"
          - label: "Adresse complète du cabinet"
            name: "adresse"
            widget: "string"
            hint: "Numéro, rue, code postal, ville"
          - label: "Email de contact"
            name: "email"
            widget: "string"
          - label: "Date de mise en vigueur"
            name: "date_vigueur"
            widget: "string"
            hint: "Ex : 1er janvier 2025"
