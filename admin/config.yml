backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"
locale: "fr"

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      - name: "site"
        label: "Informations du cabinet"
        file: "data/content.json"
        fields:

          - label: "Avocate"
            name: "avocate"
            widget: "object"
            collapsed: false
            fields:
              - label: "Nom complet"
                name: "nom"
                widget: "string"
                hint: "Ex : Maître Marie Dupont"
              - label: "Titre"
                name: "titre"
                widget: "string"
                hint: "Ex : Avocate au Barreau de Paris"
              - label: "Biographie — paragraphe 1"
                name: "bio_1"
                widget: "text"
              - label: "Biographie — paragraphe 2"
                name: "bio_2"
                widget: "text"
              - label: "Diplômes et formations"
                name: "diplomes"
                widget: "list"
                label_singular: "Ligne"
                field:
                  label: "Ligne"
                  name: "item"
                  widget: "string"
              - label: "Photo professionnelle"
                name: "photo"
                widget: "image"
                required: false
                hint: "Photo de l'avocate (fond neutre recommandé)"

          - label: "Coordonnées"
            name: "contact"
            widget: "object"
            collapsed: false
            fields:
              - label: "Téléphone (affiché)"
                name: "telephone"
                widget: "string"
                hint: "Ex : 01 23 45 67 89"
              - label: "Téléphone (lien cliquable, sans espaces)"
                name: "telephone_href"
                widget: "string"
                hint: "Ex : +33123456789"
              - label: "Email"
                name: "email"
                widget: "string"
              - label: "Adresse — ligne 1"
                name: "adresse_1"
                widget: "string"
                hint: "Numéro et rue"
              - label: "Adresse — ligne 2"
                name: "adresse_2"
                widget: "string"
                hint: "Code postal et ville"
              - label: "Horaires bureau"
                name: "horaires_bureau"
                widget: "string"
                hint: "Ex : Lundi – Vendredi : 9h – 18h"
              - label: "Horaires permanence téléphonique"
                name: "horaires_permanence"
                widget: "string"
                hint: "Ex : Permanence téléphonique : 9h30 – 12h30"

          - label: "Chiffres clés"
            name: "stats"
            widget: "object"
            collapsed: false
            fields:
              - label: "Chiffre 1 — valeur"
                name: "stat_1_val"
                widget: "string"
                hint: "Ex : 15"
              - label: "Chiffre 1 — libellé"
                name: "stat_1_lbl"
                widget: "string"
                hint: "Ex : ans d'expérience"
              - label: "Chiffre 2 — valeur"
                name: "stat_2_val"
                widget: "string"
              - label: "Chiffre 2 — libellé"
                name: "stat_2_lbl"
                widget: "string"
              - label: "Chiffre 3 — valeur"
                name: "stat_3_val"
                widget: "string"
              - label: "Chiffre 3 — libellé"
                name: "stat_3_lbl"
                widget: "string"

          - label: "Témoignages"
            name: "temoignages"
            widget: "object"
            collapsed: false
            fields:
              - label: "Témoignage 1 — Texte"
                name: "t1_texte"
                widget: "text"
              - label: "Témoignage 1 — Nom"
                name: "t1_nom"
                widget: "string"
              - label: "Témoignage 1 — Rôle / contexte"
                name: "t1_role"
                widget: "string"
                hint: "Ex : Copropriétaire, Paris 11e"
              - label: "Témoignage 1 — Initiales"
                name: "t1_initiales"
                widget: "string"
                hint: "Ex : P.M"
              - label: "Témoignage 2 — Texte"
                name: "t2_texte"
                widget: "text"
              - label: "Témoignage 2 — Nom"
                name: "t2_nom"
                widget: "string"
              - label: "Témoignage 2 — Rôle / contexte"
                name: "t2_role"
                widget: "string"
              - label: "Témoignage 2 — Initiales"
                name: "t2_initiales"
                widget: "string"
              - label: "Témoignage 3 — Texte"
                name: "t3_texte"
                widget: "text"
              - label: "Témoignage 3 — Nom"
                name: "t3_nom"
                widget: "string"
              - label: "Témoignage 3 — Rôle / contexte"
                name: "t3_role"
                widget: "string"
              - label: "Témoignage 3 — Initiales"
                name: "t3_initiales"
                widget: "string"
