backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"
locale: "fr"
# Cache bust: 2025-05-03-2

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      - name: "avocate"
        label: "👩‍⚖️ Votre profil"
        file: "data/avocate.json"
        fields:
          - label: "Nom complet"
            name: "nom"
            widget: "string"
            hint: "Ex : Maître Marie Dupont"
          - label: "Titre"
            name: "titre"
            widget: "string"
            hint: "Ex : Avocate au Barreau de Paris"
          - label: "Biographie — paragraphe 1"
            name: "bio_1"
            widget: "text"
          - label: "Biographie — paragraphe 2"
            name: "bio_2"
            widget: "text"
          - label: "Diplômes et formations"
            name: "diplomes"
            widget: "list"
            label_singular: "Ligne"
            field:
              label: "Ligne"
              name: "item"
              widget: "string"
          - label: "Photo professionnelle"
            name: "photo"
            widget: "image"
            required: false
            hint: "Photo de l'avocate (fond neutre recommandé)"

      - name: "contact"
        label: "✉️ Page Contact"
        file: "data/contact.json"
        fields:
          - label: "[En-tête] Petite étiquette (eyebrow)"
            name: "hero_eyebrow"
            widget: "string"
            hint: "Ex : Contact"
          - label: "[En-tête] Titre principal"
            name: "hero_titre"
            widget: "string"
            hint: "Ex : Prenons rendez-vous."
          - label: "[En-tête] Sous-titre"
            name: "hero_sous_titre"
            widget: "text"
          - label: "[Bloc cabinet] Petite étiquette"
            name: "infos_eyebrow"
            widget: "string"
          - label: "[Bloc cabinet] Titre"
            name: "infos_titre"
            widget: "string"
          - label: "[Bloc cabinet] Texte de présentation"
            name: "infos_texte"
            widget: "text"
          - label: "[Coordonnées] Étiquette « Adresse »"
            name: "adresse_label"
            widget: "string"
          - label: "[Coordonnées] Adresse — ligne 1"
            name: "adresse_1"
            widget: "string"
            hint: "Numéro et rue"
          - label: "[Coordonnées] Adresse — ligne 2"
            name: "adresse_2"
            widget: "string"
            hint: "Code postal et ville"
          - label: "[Coordonnées] Étiquette « Téléphone »"
            name: "telephone_label"
            widget: "string"
          - label: "[Coordonnées] Téléphone (affiché)"
            name: "telephone"
            widget: "string"
            hint: "Ex : 01 23 45 67 89"
          - label: "[Coordonnées] Téléphone (lien cliquable, sans espaces)"
            name: "telephone_href"
            widget: "string"
            hint: "Ex : +33123456789"
          - label: "[Coordonnées] Horaires bureau"
            name: "horaires_bureau"
            widget: "string"
          - label: "[Coordonnées] Horaires permanence"
            name: "horaires_permanence"
            widget: "string"
          - label: "[Coordonnées] Étiquette « Email »"
            name: "email_label"
            widget: "string"
          - label: "[Coordonnées] Email"
            name: "email"
            widget: "string"
          - label: "[Coordonnées] Note sous l'email"
            name: "email_note"
            widget: "string"
            hint: "Ex : Réponse sous 24h ouvrées"
          - label: "[Premier entretien] Titre de l'encart"
            name: "first_meeting_titre"
            widget: "string"
          - label: "[Premier entretien] Texte de l'encart"
            name: "first_meeting_texte"
            widget: "text"
            hint: "Ex : 30 minutes pour analyser votre dossier..."
          - label: "[Formulaire] Titre"
            name: "form_titre"
            widget: "string"
          - label: "[Formulaire] Sous-titre"
            name: "form_sous_titre"
            widget: "text"
          - label: "[Formulaire] Étiquette « Prénom »"
            name: "form_prenom_label"
            widget: "string"
          - label: "[Formulaire] Exemple Prénom (placeholder)"
            name: "form_prenom_placeholder"
            widget: "string"
          - label: "[Formulaire] Étiquette « Nom »"
            name: "form_nom_label"
            widget: "string"
          - label: "[Formulaire] Exemple Nom (placeholder)"
            name: "form_nom_placeholder"
            widget: "string"
          - label: "[Formulaire] Étiquette « Email »"
            name: "form_email_label"
            widget: "string"
          - label: "[Formulaire] Exemple Email (placeholder)"
            name: "form_email_placeholder"
            widget: "string"
          - label: "[Formulaire] Étiquette « Téléphone »"
            name: "form_tel_label"
            widget: "string"
          - label: "[Formulaire] Exemple Téléphone (placeholder)"
            name: "form_tel_placeholder"
            widget: "string"
          - label: "[Formulaire] Étiquette « Sujet »"
            name: "form_sujet_label"
            widget: "string"
          - label: "[Formulaire] Texte par défaut du menu Sujet"
            name: "form_sujet_default"
            widget: "string"
            hint: "Ex : Sélectionnez un sujet"
          - label: "[Formulaire] Sujet 1 (menu déroulant)"
            name: "form_sujet_opt_1"
            widget: "string"
          - label: "[Formulaire] Sujet 2"
            name: "form_sujet_opt_2"
            widget: "string"
          - label: "[Formulaire] Sujet 3"
            name: "form_sujet_opt_3"
            widget: "string"
          - label: "[Formulaire] Sujet 4"
            name: "form_sujet_opt_4"
            widget: "string"
          - label: "[Formulaire] Sujet 5"
            name: "form_sujet_opt_5"
            widget: "string"
          - label: "[Formulaire] Sujet 6"
            name: "form_sujet_opt_6"
            widget: "string"
          - label: "[Formulaire] Sujet 7"
            name: "form_sujet_opt_7"
            widget: "string"
          - label: "[Formulaire] Étiquette « Message »"
            name: "form_message_label"
            widget: "string"
          - label: "[Formulaire] Exemple Message (placeholder)"
            name: "form_message_placeholder"
            widget: "string"
          - label: "[Formulaire] Texte du bouton Envoyer"
            name: "form_submit_label"
            widget: "string"
            hint: "Ex : Envoyer le message →"

      - name: "stats"
        label: "📊 Chiffres clés"
        file: "data/stats.json"
        fields:
          - label: "Chiffre 1 — valeur"
            name: "stat_1_val"
            widget: "string"
            hint: "Ex : 15"
          - label: "Chiffre 1 — libellé"
            name: "stat_1_lbl"
            widget: "string"
            hint: "Ex : ans d'expérience"
          - label: "Chiffre 2 — valeur"
            name: "stat_2_val"
            widget: "string"
          - label: "Chiffre 2 — libellé"
            name: "stat_2_lbl"
            widget: "string"
          - label: "Chiffre 3 — valeur"
            name: "stat_3_val"
            widget: "string"
          - label: "Chiffre 3 — libellé"
            name: "stat_3_lbl"
            widget: "string"

      - name: "temoignages"
        label: "💬 Témoignages clients"
        file: "data/temoignages.json"
        fields:
          - label: "Témoignage 1 — Texte"
            name: "t1_texte"
            widget: "text"
          - label: "Témoignage 1 — Nom"
            name: "t1_nom"
            widget: "string"
          - label: "Témoignage 1 — Rôle / contexte"
            name: "t1_role"
            widget: "string"
            hint: "Ex : Copropriétaire, Paris 11e"
          - label: "Témoignage 1 — Initiales"
            name: "t1_initiales"
            widget: "string"
            hint: "Ex : P.M"
          - label: "Témoignage 2 — Texte"
            name: "t2_texte"
            widget: "text"
          - label: "Témoignage 2 — Nom"
            name: "t2_nom"
            widget: "string"
          - label: "Témoignage 2 — Rôle / contexte"
            name: "t2_role"
            widget: "string"
          - label: "Témoignage 2 — Initiales"
            name: "t2_initiales"
            widget: "string"
          - label: "Témoignage 3 — Texte"
            name: "t3_texte"
            widget: "text"
          - label: "Témoignage 3 — Nom"
            name: "t3_nom"
            widget: "string"
          - label: "Témoignage 3 — Rôle / contexte"
            name: "t3_role"
            widget: "string"
          - label: "Témoignage 3 — Initiales"
            name: "t3_initiales"
            widget: "string"

      - name: "copropriete"
        label: "🏢 Page Copropriété"
        file: "data/copropriete.json"
        fields:
          - label: "Titre principal"
            name: "hero_titre"
            widget: "string"
          - label: "Sous-titre"
            name: "hero_sous_titre"
            widget: "text"
          - label: "Cartes d'intervention"
            name: "cartes"
            widget: "object"
            collapsed: false
            fields:
              - label: "Carte 1 — Titre"
                name: "c1_titre"
                widget: "string"
              - label: "Carte 1 — Texte"
                name: "c1_texte"
                widget: "text"
              - label: "Carte 2 — Titre"
                name: "c2_titre"
                widget: "string"
              - label: "Carte 2 — Texte"
                name: "c2_texte"
                widget: "text"
              - label: "Carte 3 — Titre"
                name: "c3_titre"
                widget: "string"
              - label: "Carte 3 — Texte"
                name: "c3_texte"
                widget: "text"
              - label: "Carte 4 — Titre"
                name: "c4_titre"
                widget: "string"
              - label: "Carte 4 — Texte"
                name: "c4_texte"
                widget: "text"
              - label: "Carte 5 — Titre"
                name: "c5_titre"
                widget: "string"
              - label: "Carte 5 — Texte"
                name: "c5_texte"
                widget: "text"
              - label: "Carte 6 — Titre"
                name: "c6_titre"
                widget: "string"
              - label: "Carte 6 — Texte"
                name: "c6_texte"
                widget: "text"
          - label: "Texte cadre légal"
            name: "cadre_texte"
            widget: "text"
          - label: "Questions fréquentes"
            name: "faq"
            widget: "object"
            collapsed: false
            fields:
              - label: "Question 1"
                name: "q1_question"
                widget: "string"
              - label: "Réponse 1"
                name: "q1_reponse"
                widget: "text"
              - label: "Question 2"
                name: "q2_question"
                widget: "string"
              - label: "Réponse 2"
                name: "q2_reponse"
                widget: "text"
              - label: "Question 3"
                name: "q3_question"
                widget: "string"
              - label: "Réponse 3"
                name: "q3_reponse"
                widget: "text"
              - label: "Question 4"
                name: "q4_question"
                widget: "string"
              - label: "Réponse 4"
                name: "q4_reponse"
                widget: "text"
              - label: "Question 5"
                name: "q5_question"
                widget: "string"
              - label: "Réponse 5"
                name: "q5_reponse"
                widget: "text"
          - label: "Bouton CTA — Titre"
            name: "cta_titre"
            widget: "string"
          - label: "Bouton CTA — Sous-titre"
            name: "cta_sous_titre"
            widget: "string"

      - name: "energie"
        label: "⚡ Page Transition énergétique"
        file: "data/energie.json"
        fields:
          - label: "Eyebrow (petite étiquette)"
            name: "hero_eyebrow"
            widget: "string"
            hint: "Ex : Enjeu 2024–2026"
          - label: "Titre principal"
            name: "hero_titre"
            widget: "string"
          - label: "Sous-titre"
            name: "hero_sous_titre"
            widget: "text"
          - label: "Section intro — Titre"
            name: "intro_titre"
            widget: "string"
          - label: "Section intro — Paragraphe 1"
            name: "intro_texte_1"
            widget: "text"
          - label: "Section intro — Paragraphe 2"
            name: "intro_texte_2"
            widget: "text"
          - label: "Cartes d'intervention"
            name: "cartes"
            widget: "object"
            collapsed: false
            fields:
              - label: "Carte 1 — Titre"
                name: "c1_titre"
                widget: "string"
              - label: "Carte 1 — Texte"
                name: "c1_texte"
                widget: "text"
              - label: "Carte 2 — Titre"
                name: "c2_titre"
                widget: "string"
              - label: "Carte 2 — Texte"
                name: "c2_texte"
                widget: "text"
              - label: "Carte 3 — Titre"
                name: "c3_titre"
                widget: "string"
              - label: "Carte 3 — Texte"
                name: "c3_texte"
                widget: "text"
              - label: "Carte 4 — Titre"
                name: "c4_titre"
                widget: "string"
              - label: "Carte 4 — Texte"
                name: "c4_texte"
                widget: "text"
              - label: "Carte 5 — Titre"
                name: "c5_titre"
                widget: "string"
              - label: "Carte 5 — Texte"
                name: "c5_texte"
                widget: "text"
              - label: "Carte 6 — Titre"
                name: "c6_titre"
                widget: "string"
              - label: "Carte 6 — Texte"
                name: "c6_texte"
                widget: "text"
          - label: "Questions fréquentes"
            name: "faq"
            widget: "object"
            collapsed: false
            fields:
              - label: "Question 1"
                name: "q1_question"
                widget: "string"
              - label: "Réponse 1"
                name: "q1_reponse"
                widget: "text"
              - label: "Question 2"
                name: "q2_question"
                widget: "string"
              - label: "Réponse 2"
                name: "q2_reponse"
                widget: "text"
              - label: "Question 3"
                name: "q3_question"
                widget: "string"
              - label: "Réponse 3"
                name: "q3_reponse"
                widget: "text"
              - label: "Question 4"
                name: "q4_question"
                widget: "string"
              - label: "Réponse 4"
                name: "q4_reponse"
                widget: "text"
              - label: "Question 5"
                name: "q5_question"
                widget: "string"
              - label: "Réponse 5"
                name: "q5_reponse"
                widget: "text"
          - label: "Bouton CTA — Titre"
            name: "cta_titre"
            widget: "string"
          - label: "Bouton CTA — Sous-titre"
            name: "cta_sous_titre"
            widget: "string"

      - name: "legal"
        label: "📋 Mentions légales"
        file: "data/legal.json"
        fields:
          - label: "Nom complet de l'avocate"
            name: "nom_cabinet"
            widget: "string"
            hint: "Ex : Maître Laetitia Krowicki"
          - label: "Numéro SIRET"
            name: "siret"
            widget: "string"
            hint: "14 chiffres — visible dans votre attestation URSSAF"
          - label: "Adresse complète du cabinet"
            name: "adresse"
            widget: "string"
            hint: "Numéro, rue, code postal, ville"
          - label: "Email de contact"
            name: "email"
            widget: "string"
          - label: "Date de mise en vigueur"
            name: "date_vigueur"
            widget: "string"
            hint: "Ex : 1er janvier 2025"
